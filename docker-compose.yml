version: "3.9"

services:

  # ─────────────────────────────────────────────────
  #  BASE DE DATOS PostgreSQL 16
  # ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: consultorio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-consultorio_db}
      POSTGRES_USER: ${DB_USER:-medico}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CambiarEstaPassword123!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medico} -d ${DB_NAME:-consultorio_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consultorio_net

  # ─────────────────────────────────────────────────
  #  BACKEND FastAPI
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consultorio_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-medico}:${DB_PASSWORD:-CambiarEstaPassword123!}@postgres:5432/${DB_NAME:-consultorio_db}
      SECRET_KEY: ${SECRET_KEY:-cambiar-esta-clave-secreta-en-produccion-minimo-32-chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      MEDICO_NOMBRE: ${MEDICO_NOMBRE:-Dr. Nombre Apellido}
      MEDICO_ESPECIALIDAD: ${MEDICO_ESPECIALIDAD:-Cirugía Pediátrica}
      MEDICO_CEDULA: ${MEDICO_CEDULA:-00000}
      MEDICO_TEL: ${MEDICO_TEL:-000-000-0000}
      MEDICO_EMAIL: ${MEDICO_EMAIL:-medico@consultorio.com}
      MEDICO_DIRECCION: ${MEDICO_DIRECCION:-Dirección del consultorio}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1}
    volumes:
      - ./backend:/app
      - documentos_storage:/app/storage/documentos
      - logos_storage:/app/storage/logos
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - consultorio_net

  # ─────────────────────────────────────────────────
  #  FRONTEND (Nginx sirviendo los HTML)
  # ─────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: consultorio_web
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - consultorio_net

  # ─────────────────────────────────────────────────
  #  PGADMIN (opcional — interfaz para la BD)
  # ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: consultorio_pgadmin
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@consultorio.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - consultorio_net
    depends_on:
      - postgres

  # ─────────────────────────────────────────────────
  #  BACKUP AUTOMÁTICO (cron diario)
  # ─────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: consultorio_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-CambiarEstaPassword123!}
      DB_HOST: postgres
      DB_USER: ${DB_USER:-medico}
      DB_NAME: ${DB_NAME:-consultorio_db}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "while true; do
        FECHA=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h $$DB_HOST -U $$DB_USER $$DB_NAME > /backups/backup_$$FECHA.sql;
        echo 'Backup creado: backup_'$$FECHA'.sql';
        find /backups -name '*.sql' -mtime +30 -delete;
        sleep 86400;
      done"
    networks:
      - consultorio_net

# ─────────────────────────────────────────────────
#  VOLÚMENES
# ─────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  documentos_storage:
    driver: local
  logos_storage:
    driver: local

# ─────────────────────────────────────────────────
#  REDES
# ─────────────────────────────────────────────────
networks:
  consultorio_net:
    driver: bridge
